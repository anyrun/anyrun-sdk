name: Commit Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e '.[dev]'
    - name: Test with pytest
      run: |
        python -m pytest tests -x --cov=anyrun --cov-report=term-missing --cov-report=json
    # Badge is published to gh-pages (branch is auto-created by the action). Enable GitHub Pages: Settings → Pages → Source: Deploy from branch → gh-pages / (root).
    - name: Update Coverage Badge
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && matrix.python-version == '3.12'
      uses: we-cli/coverage-badge-action@v1.0.1